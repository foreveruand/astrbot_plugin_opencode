<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                         'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
            font-size: 26px;
            line-height: 1.75;
            padding: 52px 64px;
            width: 1440px;
        }
        .md-body { max-width: 100%; word-wrap: break-word; overflow-wrap: break-word; }

        /* ── Headings ─────────────────────────────────────── */
        h1, h2, h3, h4, h5, h6 {
            color: #e2e8f0;
            font-weight: 600;
            margin: 1em 0 0.45em;
            line-height: 1.3;
        }
        h1 { font-size: 1.75em; border-bottom: 2px solid #383838; padding-bottom: 0.25em; }
        h2 { font-size: 1.45em; border-bottom: 1px solid #303030; padding-bottom: 0.2em; }
        h3 { font-size: 1.2em; }
        h4 { font-size: 1.05em; }
        h5, h6 { font-size: 0.95em; color: #9ca3af; }

        /* ── Paragraph ────────────────────────────────────── */
        p { margin: 0.55em 0; white-space: pre-wrap; }

        /* ── Inline ───────────────────────────────────────── */
        strong { color: #f0f0f0; font-weight: 700; }
        em { font-style: italic; }
        del { color: #6b7280; text-decoration: line-through; }
        a { color: #38bdf8; text-decoration: none; border-bottom: 1px solid rgba(56,189,248,0.45); }

        /* ── Inline code ──────────────────────────────────── */
        code {
            font-family: Consolas, 'Courier New', Monaco, 'DejaVu Sans Mono', monospace;
            background-color: #2a2a2a;
            color: #f4a97d;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.88em;
            border: 1px solid #3d3d3d;
        }

        /* ── Fenced code block ────────────────────────────── */
        pre {
            background-color: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 24px 28px;
            margin: 0.7em 0;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
        }
        pre code {
            background: none;
            color: #d4d4d4;
            padding: 0;
            border-radius: 0;
            border: none;
            font-size: 0.9em;
        }

        /* ── Lists ────────────────────────────────────────── */
        ul, ol { margin: 0.45em 0; padding-left: 1.6em; }
        li { margin: 0.3em 0; }

        /* ── Blockquote ───────────────────────────────────── */
        blockquote {
            border-left: 4px solid #4a9eff;
            background-color: #22283a;
            margin: 0.75em 0;
            padding: 10px 20px;
            color: #a0aec0;
            border-radius: 0 6px 6px 0;
        }

        /* ── Horizontal rule ──────────────────────────────── */
        hr { border: none; border-top: 1px solid #383838; margin: 1.2em 0; }
    </style>
</head>
<body>
<div class="md-body">{{ content }}</div>
</body>
</html>
